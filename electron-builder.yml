appId: app.murmure
productName: murmure
directories:
  output: dist-electron
  buildResources: resources
files:
  - out/**
  - resources/**
  - package.json
asar: true
mac:
  target:
    # The .dmg is the user-facing installer (downloaded from the Releases page).
    - target: dmg
      arch:
        - universal
    # The .zip is required by electron-updater for in-place auto-updates on
    # macOS — a running .app can't be atomically replaced from a mounted .dmg,
    # so the updater downloads and unpacks the .zip instead. Without this,
    # auto-update fails with "ZIP file not provided".
    - target: zip
      arch:
        - universal
  category: public.app-category.utilities
  icon: resources/icon.icns
  hardenedRuntime: true
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  extendInfo:
    NSMicrophoneUsageDescription: >-
      murmure a besoin du microphone pour transcrire l'audio en direct.
    NSCameraUsageDescription: >-
      murmure n'utilise pas la caméra.
win:
  target:
    - target: nsis
      arch:
        - x64
  icon: resources/icon.ico
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
publish:
  provider: github
  owner: KevinGallaccio
  repo: murmure
  releaseType: release
